<svg viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Titel -->
  <text x="500" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Datenpipeline</text>
  <text x="500" y="56" text-anchor="middle" font-size="13" fill="#64748b">Vom Rohdaten-CSV zum interaktiven Dashboard</text>

  <!-- Boxen -->
  <!-- 1 CSV -->
  <rect x="15" y="90" width="140" height="86" rx="12" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="85" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Rohdaten</text>
  <text x="85" y="145" text-anchor="middle" font-size="11" fill="#64748b">owid-covid</text>
  <text x="85" y="159" text-anchor="middle" font-size="11" fill="#64748b">-data.csv</text>

  <!-- 2 pandas -->
  <rect x="185" y="90" width="140" height="86" rx="12" fill="#eff6ff" stroke="#2563eb"/>
  <text x="255" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">pandas</text>
  <text x="255" y="145" text-anchor="middle" font-size="11" fill="#475569">Bereinigung</text>
  <text x="255" y="159" text-anchor="middle" font-size="11" fill="#475569">429k → 395k</text>

  <!-- 3 DuckDB -->
  <rect x="355" y="90" width="140" height="86" rx="12" fill="#f5f3ff" stroke="#7c3aed"/>
  <text x="425" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">DuckDB</text>
  <text x="425" y="145" text-anchor="middle" font-size="11" fill="#475569">Datenbank</text>
  <text x="425" y="159" text-anchor="middle" font-size="11" fill="#475569">SQL-Abfragen</text>

  <!-- 4 Plotly -->
  <rect x="525" y="90" width="140" height="86" rx="12" fill="#fff7ed" stroke="#ea580c"/>
  <text x="595" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">Plotly</text>
  <text x="595" y="145" text-anchor="middle" font-size="11" fill="#475569">Zeitreihen &amp;</text>
  <text x="595" y="159" text-anchor="middle" font-size="11" fill="#475569">Weltkarte</text>

  <!-- 5 Streamlit -->
  <rect x="695" y="90" width="140" height="86" rx="12" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="765" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">Streamlit</text>
  <text x="765" y="145" text-anchor="middle" font-size="11" fill="#475569">Interaktives</text>
  <text x="765" y="159" text-anchor="middle" font-size="11" fill="#475569">Dashboard</text>

  <!-- 6 Nutzer -->
  <rect x="865" y="90" width="120" height="86" rx="12" fill="#ecfeff" stroke="#0891b2"/>
  <text x="925" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#0e7490">Analyse</text>
  <text x="925" y="150" text-anchor="middle" font-size="11" fill="#475569">im Browser</text>

  <!-- Pfeile -->
  <line x1="157" y1="133" x2="181" y2="133" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="327" y1="133" x2="351" y2="133" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="497" y1="133" x2="521" y2="133" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="667" y1="133" x2="691" y2="133" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="837" y1="133" x2="861" y2="133" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
